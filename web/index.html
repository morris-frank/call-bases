<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>maurice-frank</title>
  <style>
    :root {
      --bg: #F3EFEA;
      --fg: #2D2825;
      --dim: #8C7E72;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: "Andale Mono", "Andale Mono WT", monospace;
      text-transform: lowercase;
      overflow: hidden;
    }

    #stage {
      position: fixed;
      inset: 0;
      background: var(--bg);
    }

    #stage::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      opacity: 0.05;
      mix-blend-mode: multiply;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
    }

    canvas {
      position: relative;
      z-index: 1;
      display: block;
      width: 100%;
      height: 100%;
    }

    #hud {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 18px 22px;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      pointer-events: none;
      font-size: 16px;
      letter-spacing: .04em;
    }

    #hud-top-right {
      position: fixed;
      top: 18px;
      right: 22px;
      text-align: right;
      pointer-events: auto;
      line-height: 1.5;
      font-size: 16px;
      letter-spacing: .04em;
    }

    #hud-top-right .pct-reveal {
      opacity: 0;
      max-height: 0;
      overflow: hidden;
      color: var(--dim);
      transition: opacity .2s ease, max-height .2s ease;
    }

    #hud-top-right:hover .pct-reveal {
      opacity: 1;
      max-height: 2em;
    }

    #hud-top-right .pct-reveal b {
      color: var(--fg);
      font-weight: 400;
    }

    #rateRow {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 7px;
      cursor: pointer;
    }

    #rateThrottle {
      display: none;
      color: var(--fg);
      line-height: 0;
    }

    #rateRow.slow #rateThrottle {
      display: block;
    }

    #rateThrottle svg {
      display: block;
      width: 16px;
      height: 16px;
    }

    #rateText {
      color: var(--dim);
    }

    #rateRow.slow #rateText {
      color: var(--fg);
    }

    #coord {
      position: fixed;
      font-size: 18px;
      letter-spacing: .02em;
      text-align: center;
      white-space: nowrap;
      pointer-events: none;
      transform: translateX(-50%);
    }

    #coord .pos {
      color: var(--fg);
    }

    #coord .ctg {
      color: var(--dim);
    }

    #title {
      position: fixed;
      top: 18px;
      left: 22px;
      color: var(--dim);
      font-size: 16px;
      font-weight: 400;
      letter-spacing: .04em;
      pointer-events: none;
    }

    #attraction {
      position: fixed;
      left: 22px;
      bottom: 48px;
      width: min(440px, calc(100vw - 44px));
      display: grid;
      grid-template-columns: 40px minmax(0, 1fr);
      column-gap: 12px;
      align-items: start;
      pointer-events: auto;
      opacity: 0;
      --attraction-opacity: 0;
      --attraction-progress: 1;
      transform: translateX(0);
      transition: opacity .6s ease, transform .8s cubic-bezier(.2, .8, .2, 1);
    }

    #attraction.live {
      opacity: var(--attraction-opacity);
    }

    #attraction.enter {
      transform: translateX(0);
    }

    #attraction:not(.enter) {
      transform: translateX(14px);
    }

    #attraction.incoming::after {
      content: "";
      position: absolute;
      top: 0;
      left: 52px;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, rgba(45, 40, 37, 0), rgba(45, 40, 37, 0.12), rgba(45, 40, 37, 0));
      transform: translateX(24px);
      opacity: .65;
      animation: attraction-incoming 1.8s ease-in-out infinite;
    }

    #attractionIcon {
      width: 40px;
      height: 32px;
      color: var(--dim);
      opacity: calc(.3 + var(--attraction-opacity) * .7);
    }

    #attractionIcon svg {
      display: block;
      width: 100%;
      height: 100%;
      fill: currentColor;
    }

    #attractionBody {
      min-width: 0;
      line-height: 1.3;
    }

    #attractionTitleRow {
      display: flex;
      align-items: baseline;
      min-width: 0;
    }

    #attractionTitle {
      color: var(--fg);
      font-size: 16px;
      min-width: 0;
      flex: 1 1 auto;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-decoration: none;
      transition: color .2s ease, opacity .2s ease;
    }

    #attractionTitle:hover {
      color: var(--dim);
    }

    #attractionDetail {
      color: var(--dim);
      font-size: 13px;
      margin-top: 2px;
      opacity: calc(.2 + var(--attraction-opacity) * .8);
    }

    #attractionProgress {
      position: relative;
      margin-top: 8px;
      height: 1px;
      background: rgba(45, 40, 37, 0.08);
      overflow: hidden;
    }

    #attractionProgressFill {
      position: absolute;
      inset: 0 auto 0 0;
      width: calc(var(--attraction-progress) * 100%);
      background: rgba(45, 40, 37, 0.6);
      transform-origin: left center;
    }

    @keyframes attraction-incoming {
      0% {
        transform: translateX(30px);
        opacity: 0;
      }

      35% {
        opacity: .65;
      }

      100% {
        transform: translateX(0);
        opacity: 0;
      }
    }

    #repo {
      position: fixed;
      bottom: 18px;
      right: 22px;
      color: var(--dim);
      font-size: 16px;
      text-decoration: none;
      opacity: .45;
      transition: opacity .2s ease;
    }

    #repo:hover {
      opacity: .85;
      color: var(--fg);
    }

    .hint {
      color: var(--dim);
      font-size: 11px;
      letter-spacing: .12em;
    }

    @media (max-width: 640px) {
      #hud-top-right {
        top: 14px;
        right: 3px;
      }

      #title {
        left: 14px;
      }

      #attraction {
        left: 14px;
        bottom: 42px;
        width: min(360px, calc(100vw - 28px));
        grid-template-columns: 34px minmax(0, 1fr);
        column-gap: 10px;
      }

      #attractionIcon {
        height: 16px;
      }

      #repo {
        right: 14px;
      }

      #coord {
        text-align: right;
        transform: none;
        left: auto;
        right: 3px;
      }
    }
  </style>
</head>

<body>
  <div id="stage"><canvas id="c"></canvas></div>
  <div id="title">maurice-frank</div>
  <div id="attraction">
    <div id="attractionIcon"
         aria-hidden="true">
         <svg xmlns="http://www.w3.org/2000/svg" version="1.0" viewBox="0 0 1280 960"><path d="M629.2 134.1c-10.3 2-20.1 8.5-25.4 16.8l-2.8 4.5v63.5l-3.2.5c-1.8.3-47.8 1.9-102.3 3.6-54.4 1.7-105.1 3.5-112.7 3.9l-13.6.8-7.9 5.3c-6.7 4.6-33.9 23.5-75.3 52.3-15.9 11.1-20 14.5-20 16.7 0 1.2 15.1 14.4 44.2 38.7l44.2 36.8 17.6-.3c9.6-.2 48.1-.9 85.5-1.7s84.9-1.7 105.6-2.1l37.6-.7.6 18.3c1 27.5.9 43-.4 43-1 0-103.1-13.2-182.2-23.5-44-5.8-45.1-5.8-46.2-1.2-.8 3.3-17.5 172.2-17.5 176.8 0 5.2.7 5.4 20 7.4 71.6 7.5 226.1 24.5 227 25 .7.4 1 33 1 101.5v100.9l-2.9 2.2-2.9 2.1.3 20.7c.2 11.3.5 20.6.8 20.6s1.4.9 2.6 1.9c2.1 1.9 2.1 2.4 2.1 46.8V960h125.8l59.3-42.5 59.3-42.5 22.3-88.2c12.2-48.6 22.2-89.4 22.3-90.8 0-1.8-5.6-8.1-24.7-27.3l-24.8-24.9 4.5.5c2.5.3 26.2 2.9 52.8 5.7l48.2 5.2 7.3-6.4c3.9-3.6 23.6-21 43.7-38.8 20.1-17.7 36.9-32.9 37.3-33.6.5-.8.5-2.2.2-3.2-.6-1.4-100.3-90.6-106.7-95.4-1.7-1.2-11.5-2.9-37.8-6.3-19.5-2.5-75-9.7-123.3-16-48.3-6.2-88-11.5-88.2-11.7-.5-.4-3.5-73.1-3.1-73.5.1-.2 34.7-1.4 76.7-2.8 143.8-4.7 157.2-5.3 158.6-7.2.7-.9 1.1-2.6.8-3.7-.2-1.2-2.5-19.9-5-41.6-4.9-42.1-9.8-82.9-11.7-97.3-.6-4.9-1.6-9.1-2.3-9.3-.8-.4-130.8 4.4-215.2 7.8l-7.2.3-.5-8c-.3-4.4-.8-18.5-1.1-31.3-.6-25.8-1-27.5-7.7-33.8-7.4-7.1-23-11.4-33.6-9.3M748.9 634c32.1 3.3 58.6 6.2 58.8 6.4.6.6-88.1 102.6-90.8 104.5-1.4 1-2.3 1.1-3.2.3-1-.9-2.4.1-6 4.4-2.6 3.1-4.7 6.2-4.7 7s-.4 1.4-1 1.4c-.5 0-1.7.8-2.7 1.9-1.3 1.3-2.7 1.7-5 1.4-2.9-.5-3.3-.9-3.7-4.7-.3-2.2-1.2-28.2-2.1-57.6-.8-29.4-1.8-57.4-2.1-62.3-.6-8.6-.6-8.7 1.7-8.7 1.3 0 28.7 2.7 60.8 6m-55.1 135.8c.9.7.8 1.3-.8 2.7-2 1.8-2 1.8-2-.8 0-2.8.6-3.2 2.8-1.9"/></svg>
    </div>
    <div id="attractionBody">
      <div id="attractionTitleRow">
        <a id="attractionTitle"
           href="#"
           target="_blank"
           rel="noopener"></a>
      </div>
      <div id="attractionDetail"></div>
      <div id="attractionProgress"><div id="attractionProgressFill"></div></div>
    </div>
  </div>
  <a id="repo"
     href="https://github.com/morris-frank/call-bases"
     target="_blank"
     rel="noopener">&lt;/&gt;</a>
  <div id="coord"><span class="ctg"
          id="ctg">&mdash;</span> <span class="pos"
          id="pos"></span></div>
  <div id="hud-top-right">
    <div id="rateRow">
      <span id="rateThrottle" aria-hidden="true" title="throttled playback">
<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd"><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" id="mdi-tortoise" width="24" height="24" viewBox="0 0 24 24"><path d="M19.31,5.6C18.09,5.56 16.88,6.5 16.5,8C16,10 16,10 15,11C13,13 10,14 4,15C3,15.16 2.5,15.5 2,16C4,16 6,16 4.5,17.5L3,19H6L8,17C10,18 11.33,18 13.33,17L14,19H17L16,16C16,16 17,12 18,11C19,10 19,11 20,11C21,11 22,10 22,8.5C22,8 22,7 20.5,6C20.15,5.76 19.74,5.62 19.31,5.6M9,6A6,6 0 0,0 3,12C3,12.6 3.13,13.08 3.23,13.6C9.15,12.62 12.29,11.59 13.93,9.94L14.43,9.44C13.44,7.34 11.32,6 9,6Z" /></svg>
      </span>
      <div id="rateText"></div>
    </div>
    <div class="pct-reveal"><b id="pct">0.000%</b> revealed</div>
  </div>
  <div id="hud">
    <div class="hint"
         id="hoverHint"></div>
  </div>

  <script>
    (() => {
      "use strict";

      const COLORS = { A: "#74b27f", C: "#57add1", G: "#ce9360", T: "#D78A7A" };
      const COMP = { A: "T", T: "A", C: "G", G: "C" };
      const N_COLOR = "#51463E";
      const baseColor = (ch) => COLORS[ch] || N_COLOR;
      const complement = (ch) => COMP[ch] || "N";
      const lc = (s) => String(s).toLowerCase();
      const uc = (s) => String(s).toUpperCase();

      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d");
      const el = {
        coord: document.getElementById("coord"),
        ctg: document.getElementById("ctg"),
        pos: document.getElementById("pos"),
        pct: document.getElementById("pct"),
        rate: document.getElementById("rateText"),
        rateRow: document.getElementById("rateRow"),
        hoverHint: document.getElementById("hoverHint"),
        attraction: document.getElementById("attraction"),
        attractionTitle: document.getElementById("attractionTitle"),
        attractionDetail: document.getElementById("attractionDetail"),
      };

      // --- model -------------------------------------------------------------
      const M = {
        n: 0,
        rate: 0,
        startEpoch: 0,
        pileup: false,
        contigs: [],
        bufStart: 0,
        bases: "",
        maxRevealed: 0,
        complete: false,
        attractionsEnabled: false,
        attractions: [],
        currentAttraction: null,
        attractionProgress: 0,
      };
      const BUF_CAP = 60000;

      // Smoothed playback: EMA cadence from ticks, chase revealed edge at smooth rate.
      const pace = {
        displayT: 0,
        emaRate: 0,
        lastTickAt: 0,
        lastTickIndex: 0,
      };
      const PACE_EMA = 0.18;
      const PACE_NOMINAL_BLEND = 0.004;
      const SLOW_PLAYBACK_RATE = 12;
      let slowMode = false;

      function playbackRate() {
        if (slowMode) return SLOW_PLAYBACK_RATE;
        return pace.emaRate > 0 ? pace.emaRate : M.rate;
      }

      function updateRateLabel() {
        el.rate.textContent = formatRate(playbackRate());
        el.rateRow.classList.toggle("slow", slowMode);
      }

      function resetPace(index, rate) {
        pace.displayT = index;
        pace.emaRate = rate;
        pace.lastTickAt = performance.now();
        pace.lastTickIndex = index;
      }

      function noteTick(index) {
        const now = performance.now();
        if (index > pace.lastTickIndex && pace.lastTickAt > 0) {
          const dt = (now - pace.lastTickAt) / 1000;
          if (dt > 0.02) {
            const measured = (index - pace.lastTickIndex) / dt;
            if (pace.emaRate <= 0) pace.emaRate = measured;
            else pace.emaRate = pace.emaRate * (1 - PACE_EMA) + measured * PACE_EMA;
          }
        }
        pace.lastTickAt = now;
        pace.lastTickIndex = index;
        if (M.rate > 0) {
          pace.emaRate = pace.emaRate * (1 - PACE_NOMINAL_BLEND) + M.rate * PACE_NOMINAL_BLEND;
        }
      }

      function advanceDisplay(dt) {
        if (!M.n || M.maxRevealed <= 0) return;
        const target = M.complete ? M.n : M.maxRevealed;
        const rate = playbackRate();
        if (rate <= 0) return;

        if (pace.displayT < target) {
          pace.displayT += (dt / 1000) * rate;
          if (pace.displayT > target) pace.displayT = target;
        } else if (pace.displayT > target) {
          pace.displayT = target;
        }

        pace.displayT = Math.max(0, Math.min(pace.displayT, M.n));
      }

      function playheadIndex() {
        if (M.maxRevealed <= 0) return 0;
        return Math.max(0, Math.min(Math.floor(pace.displayT), M.n - 1, M.maxRevealed - 1));
      }

      function appendBases(fromIndex, str) {
        if (!str) return;
        if (M.bases.length === 0) {
          M.bufStart = fromIndex;
          M.bases = str;
        } else {
          M.bases += str;
        }
        M.maxRevealed = M.bufStart + M.bases.length;
        if (M.bases.length > BUF_CAP) {
          const drop = M.bases.length - BUF_CAP;
          M.bases = M.bases.slice(drop);
          M.bufStart += drop;
        }
      }

      function resetBuffer(tailStart, tail, index) {
        M.bufStart = tailStart;
        M.bases = tail || "";
        M.maxRevealed = Math.max(index, M.bufStart + M.bases.length);
        if (M.bases.length < (index - M.bufStart)) {
          M.bufStart = index;
          M.bases = "";
          M.maxRevealed = index;
        }
      }

      function contigFor(pos) {
        const c = M.contigs;
        if (!c.length) return null;
        let lo = 0, hi = c.length - 1, ans = 0;
        while (lo <= hi) {
          const mid = (lo + hi) >> 1;
          if (c[mid].start <= pos) { ans = mid; lo = mid + 1; } else { hi = mid - 1; }
        }
        return { name: c[ans].name, coord: pos - c[ans].start + 1 };
      }

      function setAttraction(attraction) {
        M.currentAttraction = attraction || null;
        if (!attraction) {
          el.attraction.classList.remove("live");
          el.attraction.classList.remove("incoming");
          el.attraction.classList.remove("enter");
          el.attractionTitle.textContent = "";
          el.attractionTitle.removeAttribute("href");
          el.attractionDetail.textContent = "";
          el.attraction.style.setProperty("--attraction-opacity", "0");
          el.attraction.style.setProperty("--attraction-progress", "0");
          return;
        }
        const now = Date.now();
        const durationMs = Math.max(8000, attraction.durationMs || ((attraction.expiresAt || 0) - (attraction.emittedAt || 0)) || 18000);
        attraction.durationMs = durationMs;
        attraction.emittedAt = attraction.emittedAt || now;
        attraction.expiresAt = attraction.expiresAt || (attraction.emittedAt + durationMs);
        el.attraction.classList.add("live");
        el.attraction.classList.remove("enter");
        requestAnimationFrame(() => el.attraction.classList.add("enter"));
        el.attractionTitle.textContent = lc(attraction.title || "");
        el.attractionDetail.textContent = lc(attraction.detail || "");
        if (attraction.url) {
          el.attractionTitle.href = attraction.url;
        } else {
          el.attractionTitle.removeAttribute("href");
        }
        el.attraction.style.setProperty("--attraction-opacity", "1");
        el.attraction.style.setProperty("--attraction-progress", "1");
      }

      function updateAttractionVisual(nowMs) {
        const attraction = M.currentAttraction;
        if (!attraction) return;
        const durationMs = Math.max(1, attraction.durationMs || 18000);
        const emittedAt = attraction.emittedAt || Date.now();
        const elapsed = Math.max(0, nowMs - emittedAt);
        const remaining = Math.max(0, durationMs - elapsed);
        const progress = remaining / durationMs;
        let opacity = 1;
        if (progress < 0.4) {
          opacity = 0.35 + (progress / 0.4) * 0.65;
        }
        el.attraction.style.setProperty("--attraction-progress", String(progress));
        el.attraction.style.setProperty("--attraction-opacity", String(opacity));
        el.attraction.classList.toggle("incoming", progress < 0.18 && progress > 0.035);
        if (remaining <= 0) {
          el.attraction.classList.remove("incoming");
          el.attraction.classList.remove("live");
        }
      }

      // --- SSE ---------------------------------------------------------------
      let es = null;
      let reconnectTimer = null;

      function connect() {
        if (reconnectTimer) {
          clearTimeout(reconnectTimer);
          reconnectTimer = null;
        }
        if (es) {
          es.close();
          es = null;
        }
        es = new EventSource("/stream");
        es.onmessage = (ev) => {
          const msg = JSON.parse(ev.data);
          if (msg.type === "hello") {
            M.n = msg.n; M.rate = msg.rate; M.startEpoch = msg.startEpoch;
            M.pileup = msg.pileup; M.contigs = msg.contigs || [];
            M.attractionsEnabled = !!msg.attractionsEnabled;
            M.attractions = msg.attractions || [];
            M.complete = false;
            resetBuffer(msg.tailStart, msg.tail, msg.index);
            resetPace(msg.index, msg.rate);
            updateRateLabel();
            el.hoverHint.textContent = M.pileup ? "hover the now-line for the pile-up" : "";
            if (M.attractionsEnabled) {
              setAttraction(M.attractions.length ? M.attractions[M.attractions.length - 1] : null);
            } else {
              setAttraction(null);
            }
          } else if (msg.type === "tick") {
            appendBases(M.maxRevealed, msg.bases);
            M.maxRevealed = Math.max(M.maxRevealed, msg.index);
            noteTick(msg.index);
          } else if (msg.type === "attraction") {
            if (!M.attractionsEnabled) return;
            M.attractions.push(msg.attraction);
            if (M.attractions.length > 12) M.attractions.splice(0, M.attractions.length - 12);
            setAttraction(msg.attraction);
          } else if (msg.type === "complete") {
            M.complete = true;
            M.maxRevealed = M.n;
            noteTick(M.n);
          }
        };
        es.onerror = () => {
          if (es) {
            es.close();
            es = null;
          }
          if (!reconnectTimer) {
            reconnectTimer = setTimeout(() => {
              reconnectTimer = null;
              connect();
            }, 800);
          }
        };
      }

      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") connect();
      });

      function formatRate(r) {
        if (r >= 1000) return (r / 1000).toFixed(2) + " kb/s";
        if (r >= 1) return r.toFixed(1) + " b/s";
        return r.toFixed(3) + " b/s";
      }

      // --- view mode ---------------------------------------------------------
      let pinnedView = "helix"; // "helix" | "chars"
      let hoverPreviewSuppressed = false;

      function activeView() {
        if (hover.helix && !hoverPreviewSuppressed) {
          return pinnedView === "helix" ? "chars" : "helix";
        }
        return pinnedView;
      }

      // --- hover pile-up -----------------------------------------------------
      const hover = { x: 0, y: 0, active: false, helix: false, data: null, lastFetch: 0, fetching: false };

      function maybeFetchPileup(absIndex) {
        if (!M.pileup || !hover.active) return;
        const now = performance.now();
        if (hover.fetching || now - hover.lastFetch < 300) return;
        hover.fetching = true;
        hover.lastFetch = now;
        fetch("/pileup?pos=" + absIndex)
          .then((r) => (r.ok ? r.json() : null))
          .then((d) => { hover.data = d; })
          .catch(() => { hover.data = null; })
          .finally(() => { hover.fetching = false; });
      }

      // --- canvas / render ---------------------------------------------------
      let W = 0, H = 0, dpr = 1;
      let CELL = 33;
      const CURSOR_FRAC = 0.72;
      const CURSOR_GAP = 3;
      const CURSOR_FG_COLOR = "#2D2825";
      const CURSOR_COMPLETE_COLOR = "#ce9360";
      const BG_COLOR = "#F3EFEA";
      const DIM_COLOR = "#8C7E72";
      const WHITE_COLOR = "#ffffff";
      const BACKBONE_MIX_PCT = 9.5;
      const MIN_FG_PCT = 95;
      const MONO_MAX_PCT = 10;
      const narrowMq = window.matchMedia("(max-width: 640px)");
      let HELIX_AMP = 30;
      const HELIX_PERIOD = 10.5;
      const CYCLE_HW = 0.56; // peak-to-peak height / one period width
      const CELL_MIN = 26;
      const CELL_MAX = 46;
      let HELIX_CURSOR_HALF = 50;
      let CHAR_CURSOR_HALF = 20;
      let animCursorHalf = 50;
      let BASE_DOT = 3.2;
      let BAR_WIDTH = 2.2;
      let BACKBONE_WIDTH = 8;
      let FONT = '400 11px "Andale Mono", "Andale Mono WT", monospace';
      let CHAR_FONT = '400 33px "Andale Mono", "Andale Mono WT", monospace';
      let PHASE = (Math.PI * 2) / HELIX_PERIOD;

      let particles = [];
      let wakeParticles = [];
      let driftT = 0;
      const WAKE_MAX = 700;
      const WAKE_SPEED_EXIT = 0.52;
      const WAKE_SPEED_DONE = 0.04;
      const PARTICLE_CAP = 100;
      const GRAY_BUCKETS = 12;

      function colorMix(bg, fg, fgPct) {
        return `color-mix(in oklab, ${bg} ${100 - fgPct}%, ${fg} ${fgPct}%)`;
      }

      function hash01(k) {
        const x = Math.sin(k * 12.9898 + 78.233) * 43758.5453;
        return x - Math.floor(x);
      }

      function fadeFgPct(cursorX, x) {
        const dist = cursorX - x;
        const pct = dist < CELL * 1.5
          ? MIN_FG_PCT + (100 - MIN_FG_PCT) * (dist / (CELL * 1.5))
          : 100;
        return Math.max(MIN_FG_PCT, Math.min(100, pct));
      }

      function wakeHighlightColor(hex) {
        const roll = Math.random();
        let mixPct;
        if (roll < 0.2) mixPct = 86 + Math.random() * 14;
        else if (roll < 0.58) mixPct = 55 + Math.random() * 36;
        else mixPct = 34 + Math.random() * 30;
        return colorMix(hex, WHITE_COLOR, mixPct);
      }

      function buildShapePaths() {
        const paths = [];
        const r = 1;
        for (const n of [3, 5, 7, 9]) {
          const poly = new Path2D();
          for (let i = 0; i < n; i++) {
            const a = -Math.PI / 2 + i * 2 * Math.PI / n;
            const px = r * Math.cos(a);
            const py = r * Math.sin(a);
            if (i === 0) poly.moveTo(px, py);
            else poly.lineTo(px, py);
          }
          poly.closePath();
          paths.push(poly);
        }
        return paths;
      }

      const shapePaths = buildShapePaths();

      function initParticles() {
        const n = Math.min(PARTICLE_CAP, Math.floor((W * H) / 12000));
        particles = [];
        for (let i = 0; i < n; i++) {
          const gray = Math.random();
          const bucket = Math.min(GRAY_BUCKETS - 1, Math.floor(gray * GRAY_BUCKETS));
          const mixPct = ((bucket + 0.5) / GRAY_BUCKETS) * MONO_MAX_PCT;
          particles.push({
            x: Math.random() * W,
            y: Math.random() * H,
            r: Math.random() * 9 + 0.25,
            shape: Math.floor(Math.random() * shapePaths.length),
            rot: Math.random() * Math.PI * 2,
            vx: (Math.random() - 0.5) * 0.1,
            vy: -(Math.random() * 0.08 + 0.008),
            wobble: Math.random() * Math.PI * 2,
            mixPct,
            fillMixPct: mixPct * 0.85,
            lw: Math.random() * 1.8 + 0.35,
          });
        }
        particles.sort((a, b) => a.mixPct - b.mixPct);
        wakeParticles = [];
      }

      function resize() {
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        W = window.innerWidth; H = window.innerHeight;
        canvas.width = Math.floor(W * dpr);
        canvas.height = Math.floor(H * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        let amp = (H * 0.72) / 2;
        CELL = (2 * amp) / (HELIX_PERIOD * CYCLE_HW);
        if (CELL > CELL_MAX) {
          CELL = CELL_MAX;
          amp = (HELIX_PERIOD * CELL * CYCLE_HW) / 2;
        } else if (CELL < CELL_MIN) {
          CELL = CELL_MIN;
          amp = (HELIX_PERIOD * CELL * CYCLE_HW) / 2;
        }
        HELIX_AMP = amp;
        BASE_DOT = Math.max(4.8, HELIX_AMP * 0.1);
        BAR_WIDTH = Math.max(3, HELIX_AMP * 0.052);
        BACKBONE_WIDTH = Math.max(BASE_DOT * 2.6, HELIX_AMP * 0.22);
        const fontPx = Math.round(Math.max(11, HELIX_AMP * 0.21));
        const labelPx = Math.round(Math.max(10, HELIX_AMP * 0.19));
        const charPx = labelPx * 3;
        HELIX_CURSOR_HALF = HELIX_AMP + BASE_DOT + 4;
        CHAR_CURSOR_HALF = Math.round(charPx * 0.52);
        animCursorHalf = cursorHalf(activeView());
        FONT = `400 ${fontPx}px "Andale Mono", "Andale Mono WT", monospace`;
        CHAR_FONT = `400 ${charPx}px "Andale Mono", "Andale Mono WT", monospace`;
        PHASE = (Math.PI * 2) / HELIX_PERIOD;
        ctx.font = FONT;
        initParticles();
      }
      window.addEventListener("resize", resize);

      el.rateRow.addEventListener("click", () => {
        slowMode = !slowMode;
        updateRateLabel();
      });

      canvas.addEventListener("mousemove", (e) => {
        hover.x = e.clientX; hover.y = e.clientY;
        const cursorX = cursorXPos();
        const midY = H / 2;
        hover.active = M.pileup && Math.abs(e.clientX - cursorX) < 26;
        const helixBand = HELIX_AMP + BASE_DOT + 18;
        hover.helix = Math.abs(e.clientY - midY) < helixBand && e.clientX > -CELL && e.clientX < cursorX + 24;
        if (hoverPreviewSuppressed && !hover.helix) hoverPreviewSuppressed = false;
        canvas.style.cursor = hover.active ? "crosshair" : "default";
      });
      canvas.addEventListener("mouseleave", () => {
        hover.active = false;
        hover.helix = false;
        hover.data = null;
        hoverPreviewSuppressed = false;
      });
      canvas.addEventListener("click", () => {
        if (hover.helix) {
          pinnedView = pinnedView === "helix" ? "chars" : "helix";
          hoverPreviewSuppressed = true;
        }
      });

      function cursorXPos() {
        if (narrowMq.matches) return W - CURSOR_GAP;
        return W * CURSOR_FRAC;
      }

      function cursorStrokeColor() {
        return M.complete ? CURSOR_COMPLETE_COLOR : CURSOR_FG_COLOR;
      }

      function backboneColor() {
        return colorMix(BG_COLOR, cursorStrokeColor(), BACKBONE_MIX_PCT);
      }

      function cursorHalf(view) {
        return view === "helix" ? HELIX_CURSOR_HALF : CHAR_CURSOR_HALF;
      }

      function targetIndex() {
        return pace.displayT;
      }

      function helixY(k, midY) {
        const s = Math.sin(k * PHASE);
        return { top: midY - HELIX_AMP * s, bot: midY + HELIX_AMP * s };
      }

      function clipLeftOfCursor(cursorX) {
        ctx.beginPath();
        ctx.rect(0, 0, cursorX, H);
        ctx.clip();
      }

      function drawParticles(midY, dt) {
        driftT += dt * 0.001;
        ctx.save();
        ctx.lineJoin = "round";
        ctx.lineCap = "round";
        let lastFill = "";
        let lastStroke = "";
        for (const p of particles) {
          p.x += p.vx + Math.sin(driftT + p.wobble) * 0.04;
          p.y += p.vy + Math.cos(driftT * 0.7 + p.wobble) * 0.025;
          if (p.x < -8) p.x = W + 8;
          if (p.x > W + 8) p.x = -8;
          if (p.y < -8) p.y = H + 8;
          if (p.y > H + 8) p.y = -8;
          const nearHelix = 1 - Math.min(1, Math.abs(p.y - midY) / (HELIX_AMP + 40));
          const boost = nearHelix * (100 - MIN_FG_PCT);
          const fillPct = Math.min(100, p.fillMixPct + boost);
          const strokePct = Math.min(100, p.mixPct + boost);
          const fillStyle = colorMix(BG_COLOR, DIM_COLOR, fillPct);
          const strokeStyle = colorMix(BG_COLOR, DIM_COLOR, strokePct);
          if (fillStyle !== lastFill) {
            ctx.fillStyle = fillStyle;
            lastFill = fillStyle;
          }
          if (strokeStyle !== lastStroke) {
            ctx.strokeStyle = strokeStyle;
            lastStroke = strokeStyle;
          }
          const rot = p.rot + Math.sin(driftT * 0.5 + p.wobble) * 0.08;
          const sc = p.r * 2.6;
          const c = Math.cos(rot) * sc * dpr;
          const s = Math.sin(rot) * sc * dpr;
          ctx.setTransform(c, s, -s, c, p.x * dpr, p.y * dpr);
          ctx.fill(shapePaths[p.shape]);
          ctx.lineWidth = p.lw;
          ctx.stroke(shapePaths[p.shape]);
        }
        ctx.restore();
      }

      function wakeStreamPxPerMs() {
        return playbackRate() * CELL / 1000;
      }

      function spawnWakeParticle(x, y, color, midY) {
        if (wakeParticles.length >= WAKE_MAX) wakeParticles.shift();
        const stream = wakeStreamPxPerMs();
        const outVy = Math.max(0.04, stream * 0.35);
        const sign = y < midY ? -1 : 1;
        const vx = -stream * (0.9 + Math.random() * 0.2);
        const vy = sign * (Math.random() * outVy + outVy * 0.4);
        wakeParticles.push({
          x,
          y,
          vx,
          vy,
          v0: Math.hypot(vx, vy) || 1,
          r0: Math.random() * 3.6 + 0.45,
          exit: Math.random() < 0.5 ? "grow" : "shrink",
          wobble: Math.random() * Math.PI * 2,
          color,
          drag: 0.962 + Math.random() * 0.012,
          vyDrag: 0.938 + Math.random() * 0.012,
        });
      }

      function wakeSpeedFrac(p) {
        return Math.hypot(p.vx, p.vy) / (p.v0 || 1);
      }

      function wakeExitT(p) {
        const speedFrac = wakeSpeedFrac(p);
        if (speedFrac >= WAKE_SPEED_EXIT) return 0;
        return 1 - speedFrac / WAKE_SPEED_EXIT;
      }

      function wakeExitState(p, exitT) {
        if (exitT <= 0) {
          return { r: p.r0, fgPct: 100, done: false };
        }
        if (p.exit === "grow") {
          return {
            r: p.r0 * (1 + exitT * 0.55),
            fgPct: (1 - exitT) * 100,
            done: exitT >= 0.98,
          };
        }
        return {
          r: p.r0 * (1 - exitT),
          fgPct: (1 - exitT) * 100,
          done: exitT >= 0.98 || p.r0 * (1 - exitT) < 0.12,
        };
      }

      function emitWake(from, to, t, cursorX, midY, dt) {
        const chance = dt * 0.022;
        for (let k = from; k < to; k++) {
          const x = (k - t) * CELL + cursorX;
          if (x < -CELL || x > cursorX + 0.5) continue;
          if (Math.random() > chance) continue;

          const bi = k - M.bufStart;
          const ch = bi >= 0 && bi < M.bases.length ? M.bases[bi] : null;
          const { top, bot } = helixY(k, midY);
          const strands = [
            { y: top, color: ch ? wakeHighlightColor(baseColor(ch)) : wakeHighlightColor(N_COLOR) },
            { y: bot, color: ch ? wakeHighlightColor(baseColor(complement(ch))) : wakeHighlightColor(N_COLOR) },
          ];
          for (const s of strands) {
            spawnWakeParticle(
              x + (Math.random() - 0.5) * 3,
              s.y + (Math.random() - 0.5) * 2,
              s.color,
              midY,
            );
          }
        }
      }

      function drawWake(dt, cursorX) {
        ctx.save();
        clipLeftOfCursor(cursorX);
        const dragPow = dt / 16.67;
        for (let i = wakeParticles.length - 1; i >= 0; i--) {
          const p = wakeParticles[i];
          p.x += p.vx * dt;
          p.y += p.vy * dt + Math.sin(driftT * 2.4 + p.wobble) * 0.0009 * dt;
          const drag = Math.pow(p.drag ?? 0.966, dragPow);
          const vyDrag = Math.pow(p.vyDrag ?? 0.944, dragPow);
          p.vx *= drag;
          p.vy *= vyDrag;
          const speedFrac = wakeSpeedFrac(p);
          const exitT = wakeExitT(p);
          const { r, fgPct, done } = wakeExitState(p, exitT);
          if (done || speedFrac < WAKE_SPEED_DONE || p.x < -12 || p.x > cursorX + 0.5 || p.y < -12 || p.y > H + 12) {
            wakeParticles.splice(i, 1);
            continue;
          }
          ctx.fillStyle = colorMix(BG_COLOR, p.color, Math.max(0, fgPct));
          ctx.beginPath();
          ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      function emitCharParticles(from, to, t, cursorX, midY, dt) {
        const chance = dt * 0.02;
        for (let k = from; k < to; k++) {
          const x = (k - t) * CELL + cursorX;
          if (x < -CELL || x > cursorX + 0.5) continue;
          if (Math.random() > chance) continue;
          const bi = k - M.bufStart;
          const ch = bi >= 0 && bi < M.bases.length ? M.bases[bi] : null;
          if (!ch) continue;
          spawnWakeParticle(
            x + (Math.random() - 0.5) * 4,
            midY + (Math.random() - 0.5) * 3,
            wakeHighlightColor(baseColor(ch)),
            midY,
          );
        }
      }

      function drawCharList(from, to, t, cursorX, midY) {
        ctx.save();
        ctx.font = CHAR_FONT;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        for (let k = from; k < to; k++) {
          const bi = k - M.bufStart;
          if (bi < 0 || bi >= M.bases.length) continue;
          const ch = M.bases[bi];
          const x = (k - t) * CELL + cursorX;
          if (x < -CELL || x > cursorX + 0.5) continue;
          ctx.fillStyle = colorMix(BG_COLOR, baseColor(ch), fadeFgPct(cursorX, x));
          ctx.save();
          ctx.translate(x + (hash01(k) - 0.5) * 2, midY + (hash01(k + 99) - 0.5) * 1.5);
          ctx.rotate((hash01(k + 7) - 0.5) * 0.06);
          ctx.fillText(uc(ch), 0, 0);
          ctx.restore();
        }
        ctx.restore();
      }

      function drawBackbone(from, to, t, cursorX, midY) {
        const drawStrand = (which) => {
          ctx.beginPath();
          let started = false;
          for (let k = from; k < to; k++) {
            const x = (k - t) * CELL + cursorX;
            if (x < -CELL || x > cursorX + 0.5) continue;
            const { top, bot } = helixY(k, midY);
            const y = which === "top" ? top : bot;
            if (!started) { ctx.moveTo(x, y); started = true; }
            else ctx.lineTo(x, y);
          }
          if (!started) return;
          ctx.strokeStyle = backboneColor();
          ctx.lineWidth = BACKBONE_WIDTH;
          ctx.lineJoin = "round";
          ctx.stroke();
        };
        drawStrand("top");
        drawStrand("bot");
      }

      function drawBasePair(k, ch, t, cursorX, midY) {
        const x = (k - t) * CELL + cursorX;
        if (x < -CELL || x > W + CELL || x > cursorX + 0.5) return;
        const fgPct = fadeFgPct(cursorX, x);
        const { top, bot } = helixY(k, midY);
        const c1 = baseColor(ch);
        const c2 = baseColor(complement(ch));

        const mid = (top + bot) / 2;
        ctx.lineWidth = BAR_WIDTH;
        ctx.lineCap = "round";
        ctx.strokeStyle = colorMix(BG_COLOR, c1, fgPct);
        ctx.beginPath();
        ctx.moveTo(x, top);
        ctx.lineTo(x, mid);
        ctx.stroke();
        ctx.strokeStyle = colorMix(BG_COLOR, c2, fgPct);
        ctx.beginPath();
        ctx.moveTo(x, mid);
        ctx.lineTo(x, bot);
        ctx.stroke();

        ctx.fillStyle = colorMix(BG_COLOR, c1, fgPct);
        ctx.beginPath();
        ctx.arc(x, top, BASE_DOT, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = colorMix(BG_COLOR, c2, fgPct);
        ctx.beginPath();
        ctx.arc(x, bot, BASE_DOT, 0, Math.PI * 2);
        ctx.fill();
      }

      let lastFrame = performance.now();

      function draw(now) {
        requestAnimationFrame(draw);
        const dt = now - lastFrame;
        lastFrame = now;
        updateAttractionVisual(Date.now());

        ctx.fillStyle = BG_COLOR;
        ctx.fillRect(0, 0, W, H);
        if (!M.n) return;

        advanceDisplay(dt);

        const cursorX = cursorXPos();
        const midY = H / 2;
        const t = targetIndex();

        drawParticles(midY, dt);

        const leftIdx = Math.floor(t - cursorX / CELL) - 1;
        const rightIdx = Math.ceil(t + (W - cursorX) / CELL) + 1;
        const from = Math.max(M.bufStart, leftIdx);
        const to = Math.min(M.bufStart + M.bases.length, rightIdx);
        const view = activeView();
        const targetHalf = cursorHalf(view);
        const ease = 1 - Math.exp(-dt * 0.014);
        animCursorHalf += (targetHalf - animCursorHalf) * ease;

        ctx.save();
        clipLeftOfCursor(cursorX);

        if (view === "helix") {
          emitWake(from, to, t, cursorX, midY, dt);
          drawBackbone(from, to, t, cursorX, midY);
          for (let k = from; k < to; k++) {
            drawBasePair(k, M.bases[k - M.bufStart], t, cursorX, midY);
          }
        } else {
          emitCharParticles(from, to, t, cursorX, midY, dt);
          drawCharList(from, to, t, cursorX, midY);
        }
        ctx.restore();

        drawWake(dt, cursorX);

        ctx.strokeStyle = cursorStrokeColor();
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(cursorX, midY - animCursorHalf);
        ctx.lineTo(cursorX, midY + animCursorHalf);
        ctx.stroke();

        drawHoverColumn(cursorX, midY, t);
        updateHud(t, cursorX, midY, animCursorHalf);
      }

      function drawHoverColumn(cursorX, midY, t) {
        const absIndex = playheadIndex();
        if (hover.active) maybeFetchPileup(Math.max(0, absIndex));
        if (!hover.active || !hover.data || !hover.data.bases) return;

        const d = hover.data;
        const sq = 11, gap = 3, step = sq + gap;
        const cols = d.bases.length;
        const { top } = helixY(Math.floor(t), midY);
        const baseY = top - Math.round(HELIX_AMP * 0.48);

        ctx.save();
        clipLeftOfCursor(cursorX);
        for (let i = 0; i < cols; i++) {
          const ch = d.bases[i];
          const y = baseY - i * step;
          ctx.fillStyle = colorMix(BG_COLOR, baseColor(ch), MIN_FG_PCT);
          ctx.beginPath();
          ctx.arc(cursorX, y, sq / 2, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();

        ctx.fillStyle = DIM_COLOR;
        ctx.font = FONT;
        ctx.fillText(`ref ${lc(d.ref)}  depth ${d.depth}`, cursorX, baseY - cols * step - 8);
      }

      function updateHud(t, cursorX, midY, half) {
        const idx = playheadIndex();
        const c = contigFor(idx);
        if (c) {
          el.ctg.textContent = lc(c.name);
          el.pos.textContent = c.coord.toLocaleString("en-US");
        }
        if (narrowMq.matches) {
          el.coord.style.left = "";
          el.coord.style.right = CURSOR_GAP + "px";
        } else {
          el.coord.style.right = "";
          el.coord.style.left = cursorX + "px";
        }
        el.coord.style.top = (midY + half + 22) + "px";
        el.pct.textContent = (t / M.n * 100).toFixed(3) + "%";
      }

      resize();
      connect();
      requestAnimationFrame(draw);
    })();
  </script>
</body>

</html>
