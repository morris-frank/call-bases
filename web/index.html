<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>maurice-frank</title>
  <style>
    :root {
      --bg: #F3EFEA;
      --fg: #2D2825;
      --dim: #8C7E72;
      --A: #74b27f;
      --C: #57add1;
      --G: #ce9360;
      --T: #D78A7A;
      --N: #51463E;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: "Andale Mono", "Andale Mono WT", monospace;
      text-transform: lowercase;
      overflow: hidden;
    }

    #stage {
      position: fixed;
      inset: 0;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #hud {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 18px 22px;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      pointer-events: none;
      font-size: 13px;
      letter-spacing: .04em;
    }

    #hud-top-right {
      position: fixed;
      top: 18px;
      right: 22px;
      text-align: right;
      pointer-events: auto;
      line-height: 1.5;
      font-size: 13px;
      letter-spacing: .04em;
    }

    #hud-top-right .pct-reveal {
      opacity: 0;
      max-height: 0;
      overflow: hidden;
      color: var(--dim);
      transition: opacity .2s ease, max-height .2s ease;
    }

    #hud-top-right:hover .pct-reveal {
      opacity: 1;
      max-height: 2em;
    }

    #hud-top-right .pct-reveal b {
      color: var(--fg);
      font-weight: 400;
    }

    #rateRow {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 7px;
      cursor: pointer;
    }

    #rateThrottle {
      display: none;
      color: var(--fg);
      line-height: 0;
    }

    #rateRow.slow #rateThrottle {
      display: block;
    }

    #rateThrottle svg {
      display: block;
      width: 13px;
      height: 13px;
    }

    #rateText {
      color: var(--dim);
    }

    #rateRow.slow #rateText {
      color: var(--fg);
    }

    #coord {
      position: fixed;
      font-size: 18px;
      letter-spacing: .02em;
      text-align: center;
      white-space: nowrap;
      pointer-events: none;
      transform: translateX(-50%);
    }

    #coord .pos {
      color: var(--fg);
    }

    #coord .ctg {
      color: var(--dim);
    }

    #title {
      position: fixed;
      top: 18px;
      left: 22px;
      color: var(--dim);
      font-size: 13px;
      font-weight: 400;
      letter-spacing: .04em;
      pointer-events: none;
    }

    #repo {
      position: fixed;
      bottom: 18px;
      left: 22px;
      color: var(--dim);
      font-size: 13px;
      text-decoration: none;
      opacity: .45;
      transition: opacity .2s ease;
    }

    #repo:hover {
      opacity: .85;
      color: var(--fg);
    }

    .hint {
      color: var(--dim);
      font-size: 11px;
      letter-spacing: .12em;
    }

    @media (max-width: 640px) {
      #hud-top-right {
        top: 14px;
        right: 3px;
      }

      #title {
        left: 14px;
      }

      #repo {
        left: 14px;
      }

      #coord {
        text-align: right;
        transform: none;
        left: auto;
        right: 3px;
      }
    }
  </style>
</head>

<body>
  <div id="stage"><canvas id="c"></canvas></div>
  <div id="title">maurice-frank</div>
  <a id="repo"
     href="https://github.com/morris-frank/call-bases"
     target="_blank"
     rel="noopener">&lt;/&gt;</a>
  <div id="coord"><span class="ctg"
          id="ctg">&mdash;</span> <span class="pos"
          id="pos"></span></div>
  <div id="hud-top-right">
    <div id="rateRow">
      <span id="rateThrottle" aria-hidden="true" title="throttled playback">
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="7.5" cy="10" rx="5.2" ry="3.4" stroke="currentColor" stroke-width="1.35"/>
          <path d="M3.2 10.2c0-3.2 2-5.6 4.3-5.6s4.3 2.4 4.3 5.6" stroke="currentColor" stroke-width="1.35" stroke-linecap="round"/>
          <circle cx="11.8" cy="8.1" r="1.15" stroke="currentColor" stroke-width="1.15"/>
          <path d="M3.8 12.1v1.35M5.8 12.1v1.35M9.2 12.1v1.35M11.2 12.1v1.35" stroke="currentColor" stroke-width="1.15" stroke-linecap="round"/>
        </svg>
      </span>
      <div id="rateText"></div>
    </div>
    <div class="pct-reveal"><b id="pct">0.000%</b> revealed</div>
  </div>
  <div id="hud">
    <div class="hint"
         id="hoverHint"></div>
  </div>

  <script>
    (() => {
      "use strict";

      const COLORS = { A: "#74b27f", C: "#57add1", G: "#ce9360", T: "#D78A7A" };
      const COMP = { A: "T", T: "A", C: "G", G: "C" };
      const N_COLOR = "#51463E";
      const baseColor = (ch) => COLORS[ch] || N_COLOR;
      const complement = (ch) => COMP[ch] || "N";
      const lc = (s) => String(s).toLowerCase();
      const uc = (s) => String(s).toUpperCase();

      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d");
      const el = {
        coord: document.getElementById("coord"),
        ctg: document.getElementById("ctg"),
        pos: document.getElementById("pos"),
        pct: document.getElementById("pct"),
        rate: document.getElementById("rateText"),
        rateRow: document.getElementById("rateRow"),
        hoverHint: document.getElementById("hoverHint"),
      };

      // --- model -------------------------------------------------------------
      const M = {
        n: 0,
        rate: 0,
        startEpoch: 0,
        pileup: false,
        contigs: [],
        bufStart: 0,
        bases: "",
        maxRevealed: 0,
        complete: false,
        serverSkewMs: 0,
      };
      const BUF_CAP = 60000;

      // Smoothed playback: EMA cadence from ticks, chase revealed edge at smooth rate.
      const pace = {
        displayT: 0,
        emaRate: 0,
        lastTickAt: 0,
        lastTickIndex: 0,
      };
      const PACE_EMA = 0.18;
      const PACE_NOMINAL_BLEND = 0.004;
      const SLOW_PLAYBACK_RATE = 12;
      let slowMode = false;

      function playbackRate() {
        if (slowMode) return SLOW_PLAYBACK_RATE;
        return pace.emaRate > 0 ? pace.emaRate : M.rate;
      }

      function updateRateLabel() {
        el.rate.textContent = formatRate(playbackRate());
        el.rateRow.classList.toggle("slow", slowMode);
      }

      function resetPace(index, rate) {
        pace.displayT = index;
        pace.emaRate = rate;
        pace.lastTickAt = performance.now();
        pace.lastTickIndex = index;
      }

      function noteTick(index) {
        const now = performance.now();
        if (index > pace.lastTickIndex && pace.lastTickAt > 0) {
          const dt = (now - pace.lastTickAt) / 1000;
          if (dt > 0.02) {
            const measured = (index - pace.lastTickIndex) / dt;
            if (pace.emaRate <= 0) pace.emaRate = measured;
            else pace.emaRate = pace.emaRate * (1 - PACE_EMA) + measured * PACE_EMA;
          }
        }
        pace.lastTickAt = now;
        pace.lastTickIndex = index;
        if (M.rate > 0) {
          pace.emaRate = pace.emaRate * (1 - PACE_NOMINAL_BLEND) + M.rate * PACE_NOMINAL_BLEND;
        }
      }

      function advanceDisplay(dt) {
        if (!M.n || M.maxRevealed <= 0) return;
        const target = M.complete ? M.n : M.maxRevealed;
        const rate = playbackRate();
        if (rate <= 0) return;

        if (pace.displayT < target) {
          pace.displayT += (dt / 1000) * rate;
          if (pace.displayT > target) pace.displayT = target;
        } else if (pace.displayT > target) {
          pace.displayT = target;
        }

        pace.displayT = Math.max(0, Math.min(pace.displayT, M.n));
      }

      function playheadIndex() {
        if (M.maxRevealed <= 0) return 0;
        return Math.max(0, Math.min(Math.floor(pace.displayT), M.n - 1, M.maxRevealed - 1));
      }

      function appendBases(fromIndex, str) {
        if (!str) return;
        if (M.bases.length === 0) {
          M.bufStart = fromIndex;
          M.bases = str;
        } else {
          M.bases += str;
        }
        M.maxRevealed = M.bufStart + M.bases.length;
        if (M.bases.length > BUF_CAP) {
          const drop = M.bases.length - BUF_CAP;
          M.bases = M.bases.slice(drop);
          M.bufStart += drop;
        }
      }

      function resetBuffer(tailStart, tail, index) {
        M.bufStart = tailStart;
        M.bases = tail || "";
        M.maxRevealed = Math.max(index, M.bufStart + M.bases.length);
        if (M.bases.length < (index - M.bufStart)) {
          M.bufStart = index;
          M.bases = "";
          M.maxRevealed = index;
        }
      }

      function contigFor(pos) {
        const c = M.contigs;
        if (!c.length) return null;
        let lo = 0, hi = c.length - 1, ans = 0;
        while (lo <= hi) {
          const mid = (lo + hi) >> 1;
          if (c[mid].start <= pos) { ans = mid; lo = mid + 1; } else { hi = mid - 1; }
        }
        return { name: c[ans].name, coord: pos - c[ans].start + 1 };
      }

      // --- SSE ---------------------------------------------------------------
      let es = null;
      let reconnectTimer = null;

      function connect() {
        if (reconnectTimer) {
          clearTimeout(reconnectTimer);
          reconnectTimer = null;
        }
        if (es) {
          es.close();
          es = null;
        }
        es = new EventSource("/stream");
        es.onmessage = (ev) => {
          const msg = JSON.parse(ev.data);
          if (msg.type === "hello") {
            M.n = msg.n; M.rate = msg.rate; M.startEpoch = msg.startEpoch;
            M.pileup = msg.pileup; M.contigs = msg.contigs || [];
            M.complete = false;
            resetBuffer(msg.tailStart, msg.tail, msg.index);
            resetPace(msg.index, msg.rate);
            updateRateLabel();
            el.hoverHint.textContent = M.pileup ? "hover the now-line for the pile-up" : "";
          } else if (msg.type === "tick") {
            appendBases(M.maxRevealed, msg.bases);
            M.maxRevealed = Math.max(M.maxRevealed, msg.index);
            noteTick(msg.index);
          } else if (msg.type === "complete") {
            M.complete = true;
            M.maxRevealed = M.n;
            noteTick(M.n);
          }
        };
        es.onerror = () => {
          if (es) {
            es.close();
            es = null;
          }
          if (!reconnectTimer) {
            reconnectTimer = setTimeout(() => {
              reconnectTimer = null;
              connect();
            }, 800);
          }
        };
      }

      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") connect();
      });

      function formatRate(r) {
        if (r >= 1000) return (r / 1000).toFixed(2) + " kb/s";
        if (r >= 1) return r.toFixed(1) + " b/s";
        return r.toFixed(3) + " b/s";
      }

      // --- view mode ---------------------------------------------------------
      let pinnedView = "helix"; // "helix" | "chars"
      let hoverPreviewSuppressed = false;

      function activeView() {
        if (hover.helix && !hoverPreviewSuppressed) {
          return pinnedView === "helix" ? "chars" : "helix";
        }
        return pinnedView;
      }

      // --- hover pile-up -----------------------------------------------------
      const hover = { x: 0, y: 0, active: false, helix: false, data: null, lastFetch: 0, fetching: false };

      function maybeFetchPileup(absIndex) {
        if (!M.pileup || !hover.active) return;
        const now = performance.now();
        if (hover.fetching || now - hover.lastFetch < 300) return;
        hover.fetching = true;
        hover.lastFetch = now;
        fetch("/pileup?pos=" + absIndex)
          .then((r) => (r.ok ? r.json() : null))
          .then((d) => { hover.data = d; })
          .catch(() => { hover.data = null; })
          .finally(() => { hover.fetching = false; });
      }

      // --- canvas / render ---------------------------------------------------
      let W = 0, H = 0, dpr = 1;
      let CELL = 33;
      const CURSOR_FRAC = 0.72;
      let HELIX_AMP = 30;
      const HELIX_PERIOD = 10.5;
      const CYCLE_HW = 0.56; // peak-to-peak height / one period width
      const CELL_MIN = 26;
      const CELL_MAX = 46;
      let HELIX_CURSOR_HALF = 50;
      let CHAR_CURSOR_HALF = 20;
      let animCursorHalf = 50;
      let BASE_DOT = 3.2;
      let BAR_WIDTH = 2.2;
      let BACKBONE_WIDTH = 8;
      const MIN_ALPHA = 0.95;
      let FONT = '400 11px "Andale Mono", "Andale Mono WT", monospace';
      let CHAR_FONT = '400 33px "Andale Mono", "Andale Mono WT", monospace';
      let PHASE = (Math.PI * 2) / HELIX_PERIOD;

      let particles = [];
      let wakeParticles = [];
      let driftT = 0;
      const WAKE_MAX = 700;
      const BG_RGB = { r: 243, g: 239, b: 234 };
      const GRAY_RGB = { r: 140, g: 126, b: 114 };
      const PARTICLE_CAP = 180;
      const GRAY_BUCKETS = 12;

      function monoParticleRgb(gray) {
        const t = Math.max(0, Math.min(1, gray));
        return {
          r: Math.round(BG_RGB.r + (GRAY_RGB.r - BG_RGB.r) * t),
          g: Math.round(BG_RGB.g + (GRAY_RGB.g - BG_RGB.g) * t),
          b: Math.round(BG_RGB.b + (GRAY_RGB.b - BG_RGB.b) * t),
        };
      }

      function buildShapePaths() {
        const paths = [];
        const r = 1;
        for (const n of [3, 5, 7, 9]) {
          const poly = new Path2D();
          for (let i = 0; i < n; i++) {
            const a = -Math.PI / 2 + i * 2 * Math.PI / n;
            const px = r * Math.cos(a);
            const py = r * Math.sin(a);
            if (i === 0) poly.moveTo(px, py);
            else poly.lineTo(px, py);
          }
          poly.closePath();
          paths.push(poly);
        }
        return paths;
      }

      const shapePaths = buildShapePaths();

      function initParticles() {
        const n = Math.min(PARTICLE_CAP, Math.floor((W * H) / 12000));
        particles = [];
        for (let i = 0; i < n; i++) {
          const gray = Math.random();
          const bucket = Math.min(GRAY_BUCKETS - 1, Math.floor(gray * GRAY_BUCKETS));
          const { r, g, b } = monoParticleRgb((bucket + 0.5) / GRAY_BUCKETS);
          particles.push({
            x: Math.random() * W,
            y: Math.random() * H,
            r: Math.random() * 9 + 0.25,
            shape: Math.floor(Math.random() * shapePaths.length),
            rot: Math.random() * Math.PI * 2,
            vx: (Math.random() - 0.5) * 0.1,
            vy: -(Math.random() * 0.08 + 0.008),
            wobble: Math.random() * Math.PI * 2,
            a: MIN_ALPHA + gray * (1 - MIN_ALPHA),
            aFill: MIN_ALPHA + gray * (1 - MIN_ALPHA) * 0.85,
            lw: Math.random() * 1.8 + 0.35,
            stroke: `rgb(${r},${g},${b})`,
          });
        }
        particles.sort((a, b) => (a.stroke < b.stroke ? -1 : a.stroke > b.stroke ? 1 : 0));
        wakeParticles = [];
      }

      function resize() {
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        W = window.innerWidth; H = window.innerHeight;
        canvas.width = Math.floor(W * dpr);
        canvas.height = Math.floor(H * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        let amp = (H * 0.72) / 2;
        CELL = (2 * amp) / (HELIX_PERIOD * CYCLE_HW);
        if (CELL > CELL_MAX) {
          CELL = CELL_MAX;
          amp = (HELIX_PERIOD * CELL * CYCLE_HW) / 2;
        } else if (CELL < CELL_MIN) {
          CELL = CELL_MIN;
          amp = (HELIX_PERIOD * CELL * CYCLE_HW) / 2;
        }
        HELIX_AMP = amp;
        BASE_DOT = Math.max(4.8, HELIX_AMP * 0.1);
        BAR_WIDTH = Math.max(3, HELIX_AMP * 0.052);
        BACKBONE_WIDTH = Math.max(BASE_DOT * 2.6, HELIX_AMP * 0.22);
        const fontPx = Math.round(Math.max(11, HELIX_AMP * 0.21));
        const labelPx = Math.round(Math.max(10, HELIX_AMP * 0.19));
        const charPx = labelPx * 3;
        HELIX_CURSOR_HALF = HELIX_AMP + BASE_DOT + 4;
        CHAR_CURSOR_HALF = Math.round(charPx * 0.52);
        animCursorHalf = cursorHalf(activeView());
        FONT = `400 ${fontPx}px "Andale Mono", "Andale Mono WT", monospace`;
        CHAR_FONT = `400 ${charPx}px "Andale Mono", "Andale Mono WT", monospace`;
        PHASE = (Math.PI * 2) / HELIX_PERIOD;
        ctx.font = FONT;
        initParticles();
      }
      window.addEventListener("resize", resize);

      el.rateRow.addEventListener("click", () => {
        slowMode = !slowMode;
        updateRateLabel();
      });

      canvas.addEventListener("mousemove", (e) => {
        hover.x = e.clientX; hover.y = e.clientY;
        const cursorX = W * CURSOR_FRAC;
        const midY = H / 2;
        hover.active = M.pileup && Math.abs(e.clientX - cursorX) < 26;
        const helixBand = HELIX_AMP + BASE_DOT + 18;
        hover.helix = Math.abs(e.clientY - midY) < helixBand && e.clientX > -CELL && e.clientX < cursorX + 24;
        if (hoverPreviewSuppressed && !hover.helix) hoverPreviewSuppressed = false;
        canvas.style.cursor = hover.active ? "crosshair" : "default";
      });
      canvas.addEventListener("mouseleave", () => {
        hover.active = false;
        hover.helix = false;
        hover.data = null;
        hoverPreviewSuppressed = false;
      });
      canvas.addEventListener("click", () => {
        if (hover.helix) {
          pinnedView = pinnedView === "helix" ? "chars" : "helix";
          hoverPreviewSuppressed = true;
        }
      });

      function cursorHalf(view) {
        return view === "helix" ? HELIX_CURSOR_HALF : CHAR_CURSOR_HALF;
      }

      function targetIndex() {
        return pace.displayT;
      }

      function helixY(k, midY) {
        const s = Math.sin(k * PHASE);
        return { top: midY - HELIX_AMP * s, bot: midY + HELIX_AMP * s };
      }

      function fadeAlpha(cursorX, x) {
        const dist = cursorX - x;
        const a = dist < CELL * 1.5 ? MIN_ALPHA + (1 - MIN_ALPHA) * (dist / (CELL * 1.5)) : 1;
        return Math.max(MIN_ALPHA, Math.min(1, a));
      }

      function hexToRgb(hex) {
        const h = hex.replace("#", "");
        return {
          r: parseInt(h.slice(0, 2), 16),
          g: parseInt(h.slice(2, 4), 16),
          b: parseInt(h.slice(4, 6), 16),
        };
      }

      function rgba(hex, a) {
        const { r, g, b } = hexToRgb(hex);
        return `rgba(${r},${g},${b},${a})`;
      }

      function wakeHighlightColor(hex) {
        const { r, g, b } = hexToRgb(hex);
        const roll = Math.random();
        let mix;
        if (roll < 0.2) {
          mix = 0.86 + Math.random() * 0.14;
        } else if (roll < 0.58) {
          mix = 0.55 + Math.random() * 0.36;
        } else {
          mix = 0.34 + Math.random() * 0.3;
        }
        const jitter = () => (Math.random() - 0.5) * (16 + Math.random() * 56);
        const clamp = (v) => Math.max(0, Math.min(255, Math.round(v)));
        const nr = clamp(r + (255 - r) * mix + jitter());
        const ng = clamp(g + (255 - g) * mix + jitter());
        const nb = clamp(b + (255 - b) * mix + jitter());
        return `rgb(${nr},${ng},${nb})`;
      }

      function clipLeftOfCursor(cursorX) {
        ctx.beginPath();
        ctx.rect(0, 0, cursorX, H);
        ctx.clip();
      }

      function drawParticles(midY, dt) {
        driftT += dt * 0.001;
        ctx.save();
        ctx.lineJoin = "round";
        ctx.lineCap = "round";
        let lastStroke = "";
        for (const p of particles) {
          p.x += p.vx + Math.sin(driftT + p.wobble) * 0.04;
          p.y += p.vy + Math.cos(driftT * 0.7 + p.wobble) * 0.025;
          if (p.x < -8) p.x = W + 8;
          if (p.x > W + 8) p.x = -8;
          if (p.y < -8) p.y = H + 8;
          if (p.y > H + 8) p.y = -8;
          const nearHelix = 1 - Math.min(1, Math.abs(p.y - midY) / (HELIX_AMP + 40));
          const helixA = MIN_ALPHA + nearHelix * (1 - MIN_ALPHA);
          if (p.stroke !== lastStroke) {
            ctx.strokeStyle = p.stroke;
            ctx.fillStyle = p.stroke;
            lastStroke = p.stroke;
          }
          const rot = p.rot + Math.sin(driftT * 0.5 + p.wobble) * 0.08;
          const sc = p.r * 2.6;
          const c = Math.cos(rot) * sc * dpr;
          const s = Math.sin(rot) * sc * dpr;
          ctx.setTransform(c, s, -s, c, p.x * dpr, p.y * dpr);
          ctx.globalAlpha = p.aFill * helixA;
          ctx.fill(shapePaths[p.shape]);
          ctx.globalAlpha = p.a * helixA;
          ctx.lineWidth = p.lw;
          ctx.stroke(shapePaths[p.shape]);
        }
        ctx.restore();
      }

      function wakeStreamPxPerMs() {
        return playbackRate() * CELL / 1000;
      }

      function spawnWakeParticle(x, y, color, midY) {
        if (wakeParticles.length >= WAKE_MAX) wakeParticles.shift();
        const stream = wakeStreamPxPerMs();
        const outVy = Math.max(0.04, stream * 0.35);
        const sign = y < midY ? -1 : 1;
        const life = Math.random() * 0.9 + 1.2;
        wakeParticles.push({
          x,
          y,
          vx: -stream * (0.9 + Math.random() * 0.2),
          vy: sign * (Math.random() * outVy + outVy * 0.4),
          r: Math.random() * 3.6 + 0.45,
          life,
          life0: life,
          decay: Math.random() * 0.00015 + 0.00008,
          wobble: Math.random() * Math.PI * 2,
          color,
          drag: 0.962 + Math.random() * 0.012,
          vyDrag: 0.938 + Math.random() * 0.012,
        });
      }

      function emitWake(from, to, t, cursorX, midY, dt) {
        const chance = dt * 0.022;
        for (let k = from; k < to; k++) {
          const x = (k - t) * CELL + cursorX;
          if (x < -CELL || x > cursorX + 0.5) continue;
          if (Math.random() > chance) continue;

          const bi = k - M.bufStart;
          const ch = bi >= 0 && bi < M.bases.length ? M.bases[bi] : null;
          const { top, bot } = helixY(k, midY);
          const strands = [
            { y: top, color: ch ? wakeHighlightColor(baseColor(ch)) : wakeHighlightColor(N_COLOR) },
            { y: bot, color: ch ? wakeHighlightColor(baseColor(complement(ch))) : wakeHighlightColor(N_COLOR) },
          ];
          for (const s of strands) {
            spawnWakeParticle(
              x + (Math.random() - 0.5) * 3,
              s.y + (Math.random() - 0.5) * 2,
              s.color,
              midY,
            );
          }
        }
      }

      function drawWake(dt, cursorX) {
        ctx.save();
        clipLeftOfCursor(cursorX);
        const dragPow = dt / 16.67;
        for (let i = wakeParticles.length - 1; i >= 0; i--) {
          const p = wakeParticles[i];
          p.x += p.vx * dt;
          p.y += p.vy * dt + Math.sin(driftT * 2.4 + p.wobble) * 0.0009 * dt;
          const drag = Math.pow(p.drag ?? 0.966, dragPow);
          const vyDrag = Math.pow(p.vyDrag ?? 0.944, dragPow);
          p.vx *= drag;
          p.vy *= vyDrag;
          p.life -= p.decay * dt;
          if (p.life <= 0 || p.x < -12 || p.x > cursorX + 0.5 || p.y < -12 || p.y > H + 12) {
            wakeParticles.splice(i, 1);
            continue;
          }
          const fade = p.life / (p.life0 || 1);
          ctx.globalAlpha = MIN_ALPHA + fade * (1 - MIN_ALPHA);
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
        ctx.restore();
      }

      function emitCharParticles(from, to, t, cursorX, midY, dt) {
        const chance = dt * 0.02;
        for (let k = from; k < to; k++) {
          const x = (k - t) * CELL + cursorX;
          if (x < -CELL || x > cursorX + 0.5) continue;
          if (Math.random() > chance) continue;
          const bi = k - M.bufStart;
          const ch = bi >= 0 && bi < M.bases.length ? M.bases[bi] : null;
          if (!ch) continue;
          spawnWakeParticle(
            x + (Math.random() - 0.5) * 4,
            midY + (Math.random() - 0.5) * 3,
            wakeHighlightColor(baseColor(ch)),
            midY,
          );
        }
      }

      function drawCharList(from, to, t, cursorX, midY) {
        ctx.save();
        ctx.font = CHAR_FONT;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        for (let k = from; k < to; k++) {
          const bi = k - M.bufStart;
          if (bi < 0 || bi >= M.bases.length) continue;
          const ch = M.bases[bi];
          const x = (k - t) * CELL + cursorX;
          if (x < -CELL || x > cursorX + 0.5) continue;
          ctx.globalAlpha = fadeAlpha(cursorX, x);
          ctx.fillStyle = baseColor(ch);
          ctx.fillText(uc(ch), x, midY);
        }
        ctx.restore();
      }

      function drawBackbone(from, to, t, cursorX, midY) {
        const drawStrand = (which) => {
          ctx.beginPath();
          let started = false;
          for (let k = from; k < to; k++) {
            const x = (k - t) * CELL + cursorX;
            if (x < -CELL || x > cursorX + 0.5) continue;
            const { top, bot } = helixY(k, midY);
            const y = which === "top" ? top : bot;
            if (!started) { ctx.moveTo(x, y); started = true; }
            else ctx.lineTo(x, y);
          }
          if (!started) return;
          ctx.strokeStyle = "rgba(45, 40, 37, 0.95)";
          ctx.lineWidth = BACKBONE_WIDTH;
          ctx.lineJoin = "round";
          ctx.stroke();
        };
        drawStrand("top");
        drawStrand("bot");
      }

      function drawBasePair(k, ch, t, cursorX, midY) {
        const x = (k - t) * CELL + cursorX;
        if (x < -CELL || x > W + CELL || x > cursorX + 0.5) return;
        const alpha = fadeAlpha(cursorX, x);
        const { top, bot } = helixY(k, midY);
        const c1 = baseColor(ch);
        const c2 = baseColor(complement(ch));

        ctx.save();
        ctx.globalAlpha = alpha;

        const grad = ctx.createLinearGradient(x, top, x, bot);
        grad.addColorStop(0, rgba(c1, MIN_ALPHA));
        grad.addColorStop(0.5, rgba(c1, MIN_ALPHA));
        grad.addColorStop(0.5, rgba(c2, MIN_ALPHA));
        grad.addColorStop(1, rgba(c2, MIN_ALPHA));
        ctx.strokeStyle = grad;
        ctx.lineWidth = BAR_WIDTH;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(x, top);
        ctx.lineTo(x, bot);
        ctx.stroke();
        ctx.restore();

        ctx.fillStyle = c1;
        ctx.beginPath();
        ctx.arc(x, top, BASE_DOT, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = c2;
        ctx.beginPath();
        ctx.arc(x, bot, BASE_DOT, 0, Math.PI * 2);
        ctx.fill();
      }

      let lastFrame = performance.now();

      function draw(now) {
        requestAnimationFrame(draw);
        const dt = now - lastFrame;
        lastFrame = now;

        ctx.fillStyle = "#F3EFEA";
        ctx.fillRect(0, 0, W, H);
        if (!M.n) return;

        advanceDisplay(dt);

        const cursorX = W * CURSOR_FRAC;
        const midY = H / 2;
        const t = targetIndex();

        drawParticles(midY, dt);

        const leftIdx = Math.floor(t - cursorX / CELL) - 1;
        const rightIdx = Math.ceil(t + (W - cursorX) / CELL) + 1;
        const from = Math.max(M.bufStart, leftIdx);
        const to = Math.min(M.bufStart + M.bases.length, rightIdx);
        const view = activeView();
        const targetHalf = cursorHalf(view);
        const ease = 1 - Math.exp(-dt * 0.014);
        animCursorHalf += (targetHalf - animCursorHalf) * ease;

        ctx.save();
        clipLeftOfCursor(cursorX);

        if (view === "helix") {
          emitWake(from, to, t, cursorX, midY, dt);
          drawBackbone(from, to, t, cursorX, midY);
          for (let k = from; k < to; k++) {
            drawBasePair(k, M.bases[k - M.bufStart], t, cursorX, midY);
          }
        } else {
          emitCharParticles(from, to, t, cursorX, midY, dt);
          drawCharList(from, to, t, cursorX, midY);
        }
        ctx.restore();

        drawWake(dt, cursorX);

        ctx.strokeStyle = M.complete ? "rgba(206, 147, 96, 0.95)" : "rgba(45, 40, 37, 0.95)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(cursorX, midY - animCursorHalf);
        ctx.lineTo(cursorX, midY + animCursorHalf);
        ctx.stroke();

        drawHoverColumn(cursorX, midY, t);
        updateHud(t, cursorX, midY, animCursorHalf);
      }

      function drawHoverColumn(cursorX, midY, t) {
        const absIndex = playheadIndex();
        if (hover.active) maybeFetchPileup(Math.max(0, absIndex));
        if (!hover.active || !hover.data || !hover.data.bases) return;

        const d = hover.data;
        const sq = 11, gap = 3, step = sq + gap;
        const cols = d.bases.length;
        const { top } = helixY(Math.floor(t), midY);
        const baseY = top - Math.round(HELIX_AMP * 0.48);

        ctx.save();
        clipLeftOfCursor(cursorX);
        ctx.globalAlpha = MIN_ALPHA;
        for (let i = 0; i < cols; i++) {
          const ch = d.bases[i];
          const y = baseY - i * step;
          ctx.fillStyle = baseColor(ch);
          ctx.beginPath();
          ctx.arc(cursorX, y, sq / 2, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();

        ctx.globalAlpha = 1;
        ctx.fillStyle = "#8C7E72";
        ctx.font = FONT;
        ctx.fillText(`ref ${lc(d.ref)}  depth ${d.depth}`, cursorX, baseY - cols * step - 8);
      }

      const narrowMq = window.matchMedia("(max-width: 640px)");

      function updateHud(t, cursorX, midY, half) {
        const idx = playheadIndex();
        const c = contigFor(idx);
        if (c) {
          el.ctg.textContent = lc(c.name);
          el.pos.textContent = c.coord.toLocaleString("en-US");
        }
        if (narrowMq.matches) {
          el.coord.style.left = "";
          el.coord.style.right = "3px";
        } else {
          el.coord.style.right = "";
          el.coord.style.left = cursorX + "px";
        }
        el.coord.style.top = (midY + half + 22) + "px";
        el.pct.textContent = (t / M.n * 100).toFixed(3) + "%";
      }

      resize();
      connect();
      requestAnimationFrame(draw);
    })();
  </script>
</body>

</html>
